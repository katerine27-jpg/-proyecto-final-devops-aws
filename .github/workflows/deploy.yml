name: CI/CD Flask Docker AWS

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test Flask App
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements.txt

      - name: Verificar importación de Flask
        run: |
          python -c "import sys; sys.path.append('docker'); import app; print('Aplicación Flask importada correctamente')"

  deploy:
    name: Deploy AWS
    runs-on: ubuntu-latest
    needs: test

    env:
      AWS_REGION: us-east-1
      S3_BUCKET: devops-bucket-189399646295
      INSTANCE_ID: i-06fcb7472e02549a9

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Subir aplicación a S3
        run: |
          zip -r app.zip docker
          aws s3 cp app.zip s3://$S3_BUCKET/app.zip

      - name: Desplegar en EC2 usando SSM
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy aplicación Flask Docker desde GitHub Actions" \
            --parameters 'commands=[
              "cd /home/ec2-user/environment/proyecto-final-devops-aws || cd /home/ec2-user",
              "aws s3 cp s3://devops-bucket-189399646295/app.zip app.zip",
              "unzip -o app.zip",
              "cd docker",
              "sudo service docker start",
              "sudo docker rm -f web || true",
              "sudo docker build -t docker-web .",
              "sudo docker run -d --name web -p 5000:5000 docker-web"
            ]' \
            --region "$AWS_REGION"
